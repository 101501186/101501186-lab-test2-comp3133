<main class="app-shell">
  <section class="hero">
    <div class="hero-copy">
      <h1>The Wizarding World</h1>
      <p>
        Step into the wizarding world and explore your favorite Harry Potter
        characters.
      </p>
    </div>

    <div class="content-layout">
      <app-characterfilter (houseChanged)="onHouseChanged($event)" />
      <app-characterlist
        [houseFilter]="selectedHouse()"
        (characterSelected)="onCharacterSelected($event)"
      />
    </div>
  </section>
</main>

<app-characterdetails
  [characterId]="selectedCharacterId()"
  (closed)="closeCharacterDetails()"
/>
