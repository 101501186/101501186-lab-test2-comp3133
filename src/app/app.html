<main class="app-shell">
  <section class="hero">
    <p class="eyebrow">COMP3133 Lab Test 2</p>
    <h1>{{ title() }}</h1>
    <p>
      Angular app configured for the Harry Potter API. The list below is loaded from the
      public character endpoint.
    </p>

    <div class="content-layout">
      <app-characterlist (characterSelected)="onCharacterSelected($event)" />
    </div>
  </section>
</main>

<app-characterdetails
  [characterId]="selectedCharacterId()"
  (closed)="closeCharacterDetails()"
/>

<router-outlet />
